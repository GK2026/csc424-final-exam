version: "3.8"

services:

  nginx:
    image: nginx:alpine
    container_name: nginx-container
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app-network
    restart: always

  frontend:
    build: ./frontend
    container_name: frontend-container
    expose:
      - "80"
    networks:
      - app-network
    restart: always

  backend:
    build: ./backend
    container_name: backend-container
    expose:
      - "8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
    networks:
      - app-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/weatherforecast || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  app-network:
    driver: bridge
