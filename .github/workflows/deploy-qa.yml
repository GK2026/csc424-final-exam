#Test1
name: Deploy QA

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted 

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 3. Build backend image
      - name: Build backend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/backendfinal:latest ./backend

      # 4. Build frontend image
      - name: Build frontend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontendfinal:latest ./frontend

      # 5. Push backend image
      - name: Push backend image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/backendfinal:latest

      # 6. Push frontend image
      - name: Push frontend image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/frontendfinal:latest

      # 7. Deploy to QA via SSH
      - name: Deploy to QA server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.QA_HOST }}
          username: ${{ secrets.QA_USER }}
          key: ${{ secrets.QA_SSH_KEY }}
          script: |
            cd ~/csc424-final-exam
            docker compose pull
            docker compose up -d
